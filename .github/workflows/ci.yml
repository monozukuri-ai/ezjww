name: ci

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  python-rust:
    name: ${{ matrix.os }} / py${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            python-version: "3.13"
          - os: macos-latest
            python-version: "3.13"
          - os: windows-latest
            python-version: "3.13"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Create virtual environment
        shell: bash
        run: |
          python -m venv .venv
          if [[ "${RUNNER_OS}" == "Windows" ]]; then
            echo "VENV_PY=.venv/Scripts/python.exe" >> "${GITHUB_ENV}"
          else
            echo "VENV_PY=.venv/bin/python" >> "${GITHUB_ENV}"
          fi

      - name: Install build tools
        shell: bash
        run: |
          "${VENV_PY}" -m pip install --upgrade pip
          "${VENV_PY}" -m pip install maturin pytest

      - name: Rust checks
        run: |
          cargo fmt --all --check
          cargo test --workspace --quiet
          cargo clippy --workspace --all-targets --all-features -- -D warnings

      - name: Python tests (maturin develop)
        shell: bash
        run: |
          "${VENV_PY}" -m maturin develop --release
          "${VENV_PY}" -m ezjww info jww_samples/Test1.jww
          "${VENV_PY}" -m ezjww audit jww_samples/Test1.jww --json
          "${VENV_PY}" -m ezjww bbox jww_samples/Test1.jww --json --explode-inserts
          "${VENV_PY}" -m ezjww stats jww_samples/Test1.jww --json
          "${VENV_PY}" -m ezjww report jww_samples/Test1.jww --json --explode-inserts
          "${VENV_PY}" -m pytest -q tests/python

      - name: Build wheel
        shell: bash
        run: |
          rm -f src/ezjww/_core.pyd src/ezjww/_core.so src/ezjww/_core.abi3.so src/ezjww/_core.dll src/ezjww/_core.dylib
          "${VENV_PY}" -m maturin build --release --out dist
          "${VENV_PY}" -c "from pathlib import Path; wheels = list(Path('dist').glob('*.whl')); assert wheels, 'no wheel produced'; print(wheels[0].name)"

  typescript-parity:
    name: TypeScript package parity
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
          components: clippy

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Setup uv
        uses: astral-sh/setup-uv@v5

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install pnpm
        run: npm install -g pnpm@9.15.1

      - name: Install Python dependencies
        run: |
          uv sync --extra plot
          uv pip install maturin

      - name: Install TypeScript dependencies
        run: pnpm install --frozen-lockfile
        working-directory: packages/ezjww

      - name: Check wasm target
        run: |
          cargo build -p ezjww-wasm --target wasm32-unknown-unknown
          cargo clippy -p ezjww-wasm --target wasm32-unknown-unknown -- -D warnings

      - name: Build Python extension
        run: uv run maturin develop

      - name: Test TypeScript package
        run: pnpm run test
        working-directory: packages/ezjww

      - name: Build browser example
        run: pnpm run example:browser:build
        working-directory: packages/ezjww

      - name: Check Python/TypeScript parity
        run: pnpm run test:parity
        working-directory: packages/ezjww

      - name: Pack npm package
        run: pnpm pack --pack-destination /tmp
        working-directory: packages/ezjww

      - name: Smoke packed npm package
        run: |
          mkdir -p /tmp/ezjww-pack-smoke
          npm install /tmp/ezjww-0.1.0.tgz --prefix /tmp/ezjww-pack-smoke
          node -e "const fs=require('fs'); const ez=require('/tmp/ezjww-pack-smoke/node_modules/ezjww'); const data=fs.readFileSync('jww_samples/Test1.jww'); const doc=ez.readDocument(data); if (doc.header.version !== 600 || !ez.toDxfString(data).includes('SECTION')) process.exit(1);"
